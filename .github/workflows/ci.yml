name: Validate manuscript

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: python scripts/scaffold.py
      - run: python scripts/validate_markdown.py
      - run: python scripts/validate_visual_assets.py
      - run: mkdocs build --strict
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 --max-retries 5 --retry-wait-time 5 README.md SUMMARY.md chapters/ appendix/
