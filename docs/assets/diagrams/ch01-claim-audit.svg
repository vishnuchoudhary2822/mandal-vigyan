<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc"><title id="title">असाधारण तुलनात्मक दावे की जाँच</title><desc id="desc">श्लोक और आधुनिक वैज्ञानिक सिद्धान्त के कथित मेल को जाँचने के छह चरणों का मूल flowchart।</desc><rect width="1200" height="560" fill="#f8fafc"/><style>text{font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;fill:#102a43}.h{font-size:28px;font-weight:700}.b{font-size:20px}.box{fill:#fff;stroke:#2563eb;stroke-width:3;rx:16}.no{fill:#fef2f2;stroke:#b91c1c;stroke-width:3;rx:16}.line{stroke:#475569;stroke-width:4;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#475569"/></marker></defs><text x="600" y="48" text-anchor="middle" class="h">चित्र 1.2 — असाधारण तुलनात्मक दावे की जाँच</text><g text-anchor="middle"><rect x="40" y="130" width="160" height="110" class="box"/><text x="120" y="170" class="b">1. exact</text><text x="120" y="202" class="b">पाठ-स्रोत?</text><rect x="240" y="130" width="160" height="110" class="box"/><text x="320" y="170" class="b">2. व्याकरण व</text><text x="320" y="202" class="b">प्रसंग?</text><rect x="440" y="130" width="160" height="110" class="box"/><text x="520" y="170" class="b">3. नामित</text><text x="520" y="202" class="b">व्याख्या?</text><rect x="640" y="130" width="160" height="110" class="box"/><text x="720" y="170" class="b">4. precise</text><text x="720" y="202" class="b">scientific claim?</text><rect x="840" y="130" width="160" height="110" class="box"/><text x="920" y="170" class="b">5. मापनीय</text><text x="920" y="202" class="b">correspondence?</text><rect x="1040" y="130" width="120" height="110" class="box"/><text x="1100" y="170" class="b">6. स्वतंत्र</text><text x="1100" y="202" class="b">परीक्षण?</text></g><path d="M200 185H235M400 185H435M600 185H635M800 185H835M1000 185H1035" class="line"/><path d="M600 250V350" class="line"/><rect x="300" y="360" width="600" height="110" class="no"/><text x="600" y="405" text-anchor="middle" class="h">किसी कड़ी के बिना निष्कर्ष स्थगित</text><text x="600" y="440" text-anchor="middle" class="b">स्थिति: Evidence is currently inconclusive</text></svg>
