<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc"><title id="title">मण्डल शब्द के सन्दर्भ-निर्भर अर्थों का मानचित्र</title><desc id="desc">मण्डल शब्द के ऋग्वैदिक पुस्तक-विभाजन, धार्मिक-दार्शनिक और diagrammatic प्रयोगों को अलग रखने वाला concept map।</desc><rect width="1200" height="680" fill="#f8fafc"/><style>text{font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;fill:#102a43}.h{font-size:29px;font-weight:700}.b{font-size:22px}.s{font-size:18px}.box{stroke-width:3;rx:20}.line{stroke:#475569;stroke-width:4;fill:none}</style><text x="600" y="52" text-anchor="middle" class="h">चित्र 2.1 — मण्डल: सन्दर्भ-निर्भर अर्थों का मानचित्र</text><circle cx="600" cy="340" r="125" fill="#dbeafe" stroke="#1d4ed8" stroke-width="4"/><text x="600" y="330" text-anchor="middle" class="h">मण्डल</text><text x="600" y="365" text-anchor="middle" class="b">एक शब्द; अनेक प्रसंग</text><rect x="50" y="150" width="300" height="150" fill="#ecfeff" stroke="#0e7490" class="box"/><text x="200" y="200" text-anchor="middle" class="h">ऋग्वैदिक संगठन</text><text x="200" y="238" text-anchor="middle" class="b">संहिता के book-divisions</text><text x="200" y="268" text-anchor="middle" class="s">textual reference convention</text><rect x="850" y="150" width="300" height="150" fill="#f3e8ff" stroke="#7e22ce" class="box"/><text x="1000" y="200" text-anchor="middle" class="h">अनुष्ठान/दर्शन</text><text x="1000" y="238" text-anchor="middle" class="b">परम्परा-विशिष्ट अर्थ</text><text x="1000" y="268" text-anchor="middle" class="s">अलग primary source आवश्यक</text><rect x="410" y="510" width="380" height="120" fill="#fff7ed" stroke="#c2410c" class="box"/><text x="600" y="555" text-anchor="middle" class="h">चित्रात्मक/तुलनात्मक प्रयोग</text><text x="600" y="592" text-anchor="middle" class="b">map/model से direct identity नहीं</text><path d="M470 285L345 235M730 285L850 235M600 465V505" class="line"/><text x="600" y="650" text-anchor="middle" class="s">चेतावनी: शब्द-साम्य से modern cosmology का प्रमाण नहीं निकलता।</text></svg>
