<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">मण्डल शब्द के उपयोग और प्रमाण-सीमाएँ</title><desc id="desc">मण्डल के textual, political, ritual-visual और modern-popular uses को अलग evidence classes में रखने वाला मूल matrix।</desc>
  <rect width="1200" height="700" fill="#f8fafc"/><style>text{font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;fill:#102a43}.h{font-size:29px;font-weight:700}.b{font-size:22px}.s{font-size:18px}.box{stroke-width:3;rx:18}</style>
  <text x="600" y="50" text-anchor="middle" class="h">चित्र 2.2 — मण्डल: उपयोग और प्रमाण-सीमाएँ</text>
  <line x1="600" y1="105" x2="600" y2="620" stroke="#64748b" stroke-width="3"/><line x1="100" y1="365" x2="1100" y2="365" stroke="#64748b" stroke-width="3"/>
  <text x="340" y="95" text-anchor="middle" class="b">textual/analytic referent</text><text x="860" y="95" text-anchor="middle" class="b">ritual/interpretive referent</text><text x="82" y="255" transform="rotate(-90 82 255)" class="b">source-specific evidence</text><text x="82" y="545" transform="rotate(-90 82 545)" class="b">unsupported conflation risk</text>
  <rect x="140" y="145" width="375" height="165" fill="#e0f2fe" stroke="#0369a1" class="box"/><text x="327" y="195" text-anchor="middle" class="h">ऋग्वैदिक मण्डल</text><text x="327" y="230" text-anchor="middle" class="b">संहिता का book division</text><text x="327" y="265" text-anchor="middle" class="s">citation convention से सत्यापनीय</text>
  <rect x="685" y="145" width="375" height="165" fill="#ede9fe" stroke="#6d28d9" class="box"/><text x="872" y="195" text-anchor="middle" class="h">Buddhist visual mandala</text><text x="872" y="230" text-anchor="middle" class="b">ritual और meditation context</text><text x="872" y="265" text-anchor="middle" class="s">tradition-specific evidence आवश्यक</text>
  <rect x="140" y="425" width="375" height="165" fill="#ecfccb" stroke="#4d7c0f" class="box"/><text x="327" y="475" text-anchor="middle" class="h">राजमण्डल</text><text x="327" y="510" text-anchor="middle" class="b">state-relations model</text><text x="327" y="545" text-anchor="middle" class="s">*Arthaśāstra* Book 6 context</text>
  <rect x="685" y="425" width="375" height="165" fill="#fef2f2" stroke="#b91c1c" class="box"/><text x="872" y="475" text-anchor="middle" class="h">“मण्डल = galaxy”</text><text x="872" y="510" text-anchor="middle" class="b">popular visual analogy</text><text x="872" y="545" text-anchor="middle" class="s">testable correspondence अनुपस्थित</text>
  <text x="600" y="660" text-anchor="middle" class="s">निष्कर्ष: एक quadrant का evidence दूसरे quadrant में स्वतः स्थानांतरित नहीं होता।</text>
</svg>
