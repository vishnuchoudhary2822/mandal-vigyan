<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>पुस्तक मोड | मण्डल विज्ञान</title>
  <link rel="stylesheet" href="../assets/stylesheets/book-reader.css">
  <script defer src="../assets/vendor/page-flip.browser.js"></script>
  <script defer src="../assets/javascripts/book-reader.js"></script>
</head>
<body>
  <main class="book-app" aria-label="मण्डल विज्ञान पुस्तक मोड">
    <header class="book-toolbar">
      <a class="book-brand" href="../">मण्डल विज्ञान <span>· पुस्तक मोड</span></a>
      <div class="book-top-flip" aria-label="पुस्तक पलटने के controls">
        <button type="button" data-book-action="previous" aria-label="पिछला अध्याय">← पिछला</button>
        <button type="button" data-book-action="next" aria-label="अगला अध्याय">अगला →</button>
      </div>
      <a class="book-standard-link" href="../">सामान्य वेबसाइट</a>
    </header>
    <section class="book-reader">
      <aside class="book-toc" aria-label="अध्याय सूची">
        <p class="book-eyebrow">RESEARCH BOOK</p>
        <h1>मण्डल विज्ञान</h1>
        <p class="book-subtitle">पुराणिक ब्रह्माण्ड-विज्ञान और आधुनिक विज्ञान</p>
        <nav id="bookToc" aria-label="अध्याय"></nav>
      </aside>
      <section class="book-desk" aria-live="polite">
        <div class="book-stage" id="bookStage" aria-label="पृष्ठ पलटने वाली पुस्तक"></div>
        <footer class="book-controls">
          <button id="previousPage" type="button" aria-label="पिछला अध्याय">← <span>पिछला</span></button>
          <p id="bookPosition">पुस्तक तैयार हो रही है…</p>
          <button id="nextPage" type="button" aria-label="अगला अध्याय"><span>अगला</span> →</button>
        </footer>
        <p class="book-note">दाएँ/बाएँ कोने को पकड़कर खींचें, या controls दबाएँ। ऊपर या नीचे के कोने से पन्ना मोड़ना दोनों संभव है।</p>
        <p class="book-credit">Page-turn effect: <a href="https://github.com/Nodlik/StPageFlip">StPageFlip</a> (MIT License).</p>
      </section>
    </section>
  </main>
</body>
</html>
