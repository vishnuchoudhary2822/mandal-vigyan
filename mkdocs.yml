site_name: "मण्डल विज्ञान | MANDAL VIGYAN"
site_description: "पुराणिक ब्रह्माण्ड-विज्ञान और आधुनिक विज्ञान का स्रोत-आधारित अध्ययन"
site_url: "https://vishnuchoudhary2822.github.io/mandal-vigyan/"
repo_name: "vishnuchoudhary2822/mandal-vigyan"
repo_url: "https://github.com/vishnuchoudhary2822/mandal-vigyan"
edit_uri: edit/main/
docs_dir: docs
site_dir: site
exclude_docs: |
  README.md
theme:
  name: material
  language: hi
  font: {text: Noto Sans Devanagari, code: Noto Sans Devanagari}
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: {icon: material/weather-night, name: गहरा रंगरूप चुनें}
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: {icon: material/weather-sunny, name: हल्का रंगरूप चुनें}
  features: [navigation.tabs, navigation.sections, navigation.top, search.suggest, search.highlight, content.action.edit, content.code.copy]
plugins:
  - search:
      lang: [hi, en]
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
extra_css: [stylesheets/print.css, assets/stylesheets/visuals.css]
extra:
  generator: false
copyright: "Copyright &copy; 2026 Vishnu Choudhary · MANDAL VIGYAN"
